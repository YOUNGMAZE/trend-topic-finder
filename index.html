<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trend Topic Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Trend Topic Finder</h1>
<p>Discover keyword ideas and see potential for YouTube and TikTok.</p>

<div class="search-box">
<input id="query" type="text" placeholder="Enter topic...">
<button onclick="search()">Search</button>
</div>

<table id="results">
<thead>
<tr>
<th>Keyword</th>
<th>Relevance</th>
<th>YouTube Score</th>
<th>TikTok Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
